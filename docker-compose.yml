version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: childfit-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ChildFit@2026}
      MYSQL_DATABASE: childfit
      MYSQL_USER: childfit
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ChildFit@2026}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - childfit-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: childfit-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - childfit-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: childfit-backend
    restart: always
    environment:
      DATABASE_URL: mysql+pymysql://childfit:${MYSQL_PASSWORD:-ChildFit@2026}@mysql:3306/childfit
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      TZ: Asia/Shanghai
    ports:
      - "8000:8000"
    volumes:
      - ./backend/logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - childfit-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

networks:
  childfit-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
